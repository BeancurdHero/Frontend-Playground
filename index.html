<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Frontend Effect Playground - Discover 200+ interactive frontend effects with live previews and code">
    <title>Frontend Effect Playground - 前端交互效果展示平台</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- App Container -->
    <div class="app-container">

        <!-- Header Bar (60px) -->
        <header class="header-bar">
            <!-- Mobile Menu Toggle -->
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span>
            </button>

            <!-- Search Box -->
            <div class="search-container">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input
                        type="text"
                        class="search-input"
                        id="searchInput"
                        placeholder="Search 200+ effects..."
                        aria-label="Search effects"
                    >
                </div>
            </div>

            <!-- Brand Badge -->
            <div class="brand-container">
                <div class="brand-text">Designed by BeancurdHero</div>
                <div class="brand-subtext">You can find me on Github and X.com</div>
            </div>
        </header>

        <!-- Title Bar with Animated Mesh (80px) -->
        <section class="title-bar">
            <canvas id="meshCanvas" class="mesh-canvas"></canvas>
            <div class="title-overlay">
                <h1>Frontend Effect Playground</h1>
                <p>Discover 200+ interactive effects</p>
            </div>
        </section>

        <!-- Main Content Area -->
        <main class="main-content">

            <!-- Sidebar Backdrop (Mobile) -->
            <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

            <!-- Left Sidebar (280px) -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>Categories (25)</h2>
                </div>
                <nav class="sidebar-list" id="sidebarList">
                    <!-- Categories will be rendered by JS -->
                </nav>
            </aside>

            <!-- Right Content Area -->
            <section class="content-area" id="contentArea">
                <!-- Category Pills (Mobile) -->
                <div class="category-pills" id="categoryPills">
                    <!-- Categories will be rendered by JS -->
                </div>

                <div class="content-header" id="contentHeader">
                    <h2 id="categoryTitle">Select a Category</h2>
                    <p id="categorySubtitle">Choose from 25 categories to explore effects</p>
                </div>
                <div class="effects-grid" id="effectsGrid">
                    <!-- Effects will be rendered by JS -->
                </div>
            </section>

        </main>

    </div>

    <!-- Scripts -->
    <script src="js/data/categories.js"></script>
    <script src="js/data/effects.js"></script>
    <script src="js/mesh.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
